name: Auto Label

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      backfill_target:
        description: "Backfill labels onto existing open items"
        required: true
        default: "none"
        type: choice
        options:
          - none
          - open_prs
          - open_issues
          - open_prs_and_issues

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ensure-labels:
    name: Ensure Labels Exist
    runs-on: ubuntu-latest

    steps:
      - name: Create or update repository labels
        uses: actions/github-script@v7
        with:
          script: |
            const desiredLabels = [
              {
                name: "area: backend",
                color: "0e8a16",
                description: "Changes to the Python backend and scanning pipeline",
              },
              {
                name: "area: frontend",
                color: "1d76db",
                description: "Changes to the React frontend",
              },
              {
                name: "area: extension",
                color: "5319e7",
                description: "Changes to the browser extension package",
              },
              {
                name: "area: cli",
                color: "006b75",
                description: "Changes to the CLI package or entrypoints",
              },
              {
                name: "area: docs",
                color: "fbca04",
                description: "Documentation-only changes",
              },
              {
                name: "area: infra",
                color: "d4c5f9",
                description: "CI, deployment, database, or repository automation changes",
              },
              {
                name: "area: tests",
                color: "bfd4f2",
                description: "Changes to test coverage or test infrastructure",
              },
              {
                name: "bug",
                color: "d73a4a",
                description: "Bug report or bug fix related work",
              },
              {
                name: "feature",
                color: "a2eeef",
                description: "Feature request or feature implementation",
              },
              {
                name: "documentation",
                color: "0075ca",
                description: "Documentation request or docs-focused work",
              },
              {
                name: "question",
                color: "cc317c",
                description: "Question, support, or clarification request",
              },
              {
                name: "security",
                color: "b60205",
                description: "Security-sensitive issue or change",
              },
            ];

            const { owner, repo } = context.repo;
            const existingLabels = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner,
                repo,
                per_page: 100,
              },
            );
            const existingByName = new Map(
              existingLabels.map((label) => [label.name.toLowerCase(), label]),
            );

            for (const desired of desiredLabels) {
              const current = existingByName.get(desired.name.toLowerCase());

              if (!current) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  ...desired,
                });
                core.notice(`Created label: ${desired.name}`);
                continue;
              }

              const currentDescription = current.description || "";
              const needsUpdate =
                current.color.toLowerCase() !== desired.color.toLowerCase() ||
                currentDescription !== desired.description;

              if (needsUpdate) {
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: current.name,
                  new_name: desired.name,
                  color: desired.color,
                  description: desired.description,
                });
                core.notice(`Updated label: ${desired.name}`);
              }
            }

  pr-path-labels:
    name: Label Pull Requests
    if: github.event_name == 'pull_request_target'
    needs: ensure-labels
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels from changed paths
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  pr-keyword-labels:
    name: Label PRs From Title And Body
    if: github.event_name == 'pull_request_target'
    needs: ensure-labels
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels from PR keywords
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const text = `${pullRequest.title || ""}\n${pullRequest.body || ""}`.toLowerCase();
            const managedLabels = [
              "bug",
              "feature",
              "documentation",
              "question",
              "security",
              "kind: bug",
              "kind: feature",
              "kind: documentation",
              "kind: question",
              "kind: security",
            ];
            const rules = [
              {
                label: "security",
                patterns: [
                  /\bsecurity\b/,
                  /\bvulnerability\b/,
                  /\bxss\b/,
                  /\bcsrf\b/,
                  /\binjection\b/,
                  /\bmalware\b/,
                  /\bcve\b/,
                ],
              },
              {
                label: "bug",
                patterns: [
                  /\bbug\b/,
                  /\bbugfix\b/,
                  /\bfix\b/,
                  /\bfixes\b/,
                  /\bfixed\b/,
                  /\bregression\b/,
                  /\berror\b/,
                  /\bcrash\b/,
                  /\bbroken\b/,
                  /\bfailing\b/,
                  /\bfailed\b/,
                ],
              },
              {
                label: "documentation",
                patterns: [
                  /\bdocs?\b/,
                  /\breadme\b/,
                  /\bdocumentation\b/,
                  /\bguide\b/,
                ],
              },
              {
                label: "feature",
                patterns: [
                  /\bfeature\b/,
                  /\benhancement\b/,
                  /\brequest\b/,
                  /\bidea\b/,
                  /\bproposal\b/,
                  /\badd\b/,
                  /\bintroduce\b/,
                  /\bimplement\b/,
                ],
              },
              {
                label: "question",
                patterns: [
                  /\bquestion\b/,
                  /\bhow do i\b/,
                  /\bhow to\b/,
                  /\bhelp\b/,
                ],
              },
            ];

            const expected = rules
              .filter((rule) => rule.patterns.some((pattern) => pattern.test(text)))
              .map((rule) => rule.label);
            const existing = (pullRequest.labels || [])
              .map((label) => typeof label === "string" ? label : label.name)
              .filter(Boolean);
            const toRemove = existing.filter((label) => managedLabels.includes(label) && !expected.includes(label));
            const toAdd = expected.filter((label) => !existing.includes(label));

            for (const label of toRemove) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequest.number,
                name: label,
              });
              core.info(`PR #${pullRequest.number}: removed ${label}`);
            }

            if (toAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pullRequest.number,
                labels: toAdd,
              });
              core.notice(`PR #${pullRequest.number}: added ${toAdd.join(", ")}`);
            } else if (toRemove.length === 0) {
              core.info(`PR #${pullRequest.number}: no keyword label changes needed`);
            }

  issue-keyword-labels:
    name: Label Issues
    if: github.event_name == 'issues'
    needs: ensure-labels
    runs-on: ubuntu-latest

    steps:
      - name: Apply labels from issue keywords
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title || ""}\n${issue.body || ""}`.toLowerCase();
            const managedLabels = [
              "bug",
              "feature",
              "documentation",
              "question",
              "security",
              "kind: bug",
              "kind: feature",
              "kind: documentation",
              "kind: question",
              "kind: security",
            ];
            const rules = [
              {
                label: "security",
                patterns: [
                  /\bsecurity\b/,
                  /\bvulnerability\b/,
                  /\bxss\b/,
                  /\bcsrf\b/,
                  /\binjection\b/,
                  /\bmalware\b/,
                ],
              },
              {
                label: "bug",
                patterns: [
                  /\bbug\b/,
                  /\bregression\b/,
                  /\berror\b/,
                  /\bcrash\b/,
                  /\bbroken\b/,
                  /\bfailing\b/,
                  /\bfailed\b/,
                ],
              },
              {
                label: "documentation",
                patterns: [
                  /\bdocs?\b/,
                  /\breadme\b/,
                  /\bdocumentation\b/,
                  /\bguide\b/,
                ],
              },
              {
                label: "feature",
                patterns: [
                  /\bfeature\b/,
                  /\benhancement\b/,
                  /\brequest\b/,
                  /\bidea\b/,
                  /\bproposal\b/,
                ],
              },
              {
                label: "question",
