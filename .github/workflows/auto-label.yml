            }

  backfill-open-prs:
    name: Backfill Open PR Labels
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.backfill_target == 'open_prs' || github.event.inputs.backfill_target == 'open_prs_and_issues')
    needs: ensure-labels
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Backfill labels for open pull requests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from pathlib import PurePosixPath

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          owner, name = repo.split("/", 1)
          api_root = f"https://api.github.com/repos/{owner}/{name}"
          managed_labels = {
              "area: backend",
              "area: frontend",
              "area: extension",
              "area: cli",
              "area: docs",
              "area: infra",
              "area: tests",
          }

          def request_json(url, method="GET", data=None):
              payload = None if data is None else json.dumps(data).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=payload,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "User-Agent": "extensionshield-auto-label-backfill",
                  },
              )
              with urllib.request.urlopen(req) as response:
                  body = response.read().decode("utf-8")
                  if not body:
                      return None
                  return json.loads(body)

          def paginate(url):
              page = 1
              while True:
                  separator = "&" if "?" in url else "?"
                  batch = request_json(f"{url}{separator}per_page=100&page={page}")
                  if not batch:
                      break
                  for item in batch:
                      yield item
                  if len(batch) < 100:
                      break
                  page += 1

          def load_label_patterns():
              mapping = {}
              current_label = None
              with open(".github/labeler.yml", "r", encoding="utf-8") as handle:
                  for raw_line in handle:
                      stripped = raw_line.strip()
                      if not stripped or stripped.startswith("#"):
                          continue
                      if stripped.startswith('"') and stripped.endswith('":'):
                          current_label = stripped[:-1].strip('"')
                          mapping[current_label] = []
                          continue
                      if stripped.startswith('- "') and current_label:
                          mapping[current_label].append(stripped[3:-1])
              return mapping

          def compute_labels(files, rules):
              labels = set()
              for label, patterns in rules.items():
                  for file_path in files:
                      path = PurePosixPath(file_path)
                      if any(path.match(pattern) for pattern in patterns):
                          labels.add(label)
                          break
              return labels

          rules = load_label_patterns()
          pulls = list(paginate(f"{api_root}/pulls?state=open"))
          print(f"Found {len(pulls)} open pull requests to backfill.")

          for pull in pulls:
              number = pull["number"]
              files = [
                  item["filename"]
                  for item in paginate(f"{api_root}/pulls/{number}/files?")
                  if item.get("filename")
              ]
              expected = compute_labels(files, rules)
              existing = {label["name"] for label in pull.get("labels", [])}

              to_remove = sorted((existing & managed_labels) - expected)
              to_add = sorted(expected - existing)

              for label in to_remove:
                  encoded = urllib.parse.quote(label, safe="")
                  try:
                      request_json(f"{api_root}/issues/{number}/labels/{encoded}", method="DELETE")
                      print(f"PR #{number}: removed {label}")
                  except urllib.error.HTTPError as exc:
                      print(f"PR #{number}: failed to remove {label} ({exc.code})")

              if to_add:
                  request_json(f"{api_root}/issues/{number}/labels", method="POST", data={"labels": to_add})
                  print(f"PR #{number}: added {', '.join(to_add)}")
              elif not to_remove:
                  print(f"PR #{number}: no label changes needed")
          PY

  backfill-open-issues:
    name: Backfill Open Issue Labels
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.backfill_target == 'open_issues' || github.event.inputs.backfill_target == 'open_prs_and_issues')
    needs: ensure-labels
    runs-on: ubuntu-latest

    steps:
      - name: Backfill labels for open issues
        uses: actions/github-script@v7
        with:
          script: |
            const managedLabels = [
              "bug",
              "feature",
              "documentation",
              "question",
              "security",
              "kind: bug",
              "kind: feature",
              "kind: documentation",
              "kind: question",
              "kind: security",
            ];
            const rules = [
              {
                label: "security",
                patterns: [
                  /\bsecurity\b/,
                  /\bvulnerability\b/,
                  /\bxss\b/,
                  /\bcsrf\b/,
                  /\binjection\b/,
                  /\bmalware\b/,
                ],
              },
              {
                label: "bug",
                patterns: [
                  /\bbug\b/,
                  /\bregression\b/,
                  /\berror\b/,
                  /\bcrash\b/,
                  /\bbroken\b/,
                  /\bfailing\b/,
                  /\bfailed\b/,
                ],
              },
              {
                label: "documentation",
                patterns: [
                  /\bdocs?\b/,
                  /\breadme\b/,
                  /\bdocumentation\b/,
                  /\bguide\b/,
                ],
              },
              {
                label: "feature",
                patterns: [
                  /\bfeature\b/,
                  /\benhancement\b/,
                  /\brequest\b/,
                  /\bidea\b/,
                  /\bproposal\b/,
                ],
              },
              {
                label: "question",
                patterns: [
                  /\bquestion\b/,
                  /\bhow do i\b/,
                  /\bhow to\b/,
                  /\bhelp\b/,
                ],
              },
            ];

            const openIssues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: "open",
                per_page: 100,
              },
            );

            const issuesOnly = openIssues.filter((issue) => !issue.pull_request);
            core.info(`Found ${issuesOnly.length} open issues to backfill.`);

            for (const issue of issuesOnly) {
              const text = `${issue.title || ""}\n${issue.body || ""}`.toLowerCase();
              const expected = rules
                .filter((rule) => rule.patterns.some((pattern) => pattern.test(text)))
                .map((rule) => rule.label);
              const existing = (issue.labels || [])
                .map((label) => typeof label === "string" ? label : label.name)
                .filter(Boolean);
              const toRemove = existing.filter((label) => managedLabels.includes(label) && !expected.includes(label));
              const toAdd = expected.filter((label) => !existing.includes(label));

              for (const label of toRemove) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: label,
                });
                core.info(`Issue #${issue.number}: removed ${label}`);
              }

              if (toAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: toAdd,
                });
                core.info(`Issue #${issue.number}: added ${toAdd.join(", ")}`);
              } else if (toRemove.length === 0) {
                core.info(`Issue #${issue.number}: no label changes needed`);
              }
            }
